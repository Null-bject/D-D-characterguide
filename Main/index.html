<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D CharacCreator</title>
    <link rel="stylesheet" href = "style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scene">
    <button class="btn-iniciar" id="startButton">Iniciar</button>
  </div>

  <script>
    const button = document.getElementById('startButton');
    button.addEventListener('click', () => {
      document.querySelector('.scene').classList.add('zoom-bg');
      button.classList.add('fade');
      setTimeout(() => {
        window.location.href = 'next.html';
      }, 400);
    });
  </script>
</body>
</html>
