<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nome do Personagem</title>
  <link rel="stylesheet" href="next.css">
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div class="search">
        <input type="text" placeholder="Buscar personagem...">
        <button>Procurar</button>
      </div>
      <button class="top-action">Salvar</button>
    </div>

    <div class="avatar"></div>

    <div class="options">
      <div class="option-item">
        <span>Nome do Personagem</span>
        <button>Editar</button>
      </div>
      <div class="option-item">
        <span>Classe / Nível</span>
        <button>Editar</button>
      </div>
      <div class="option-item">
        <span>História</span>
        <button>Editar</button>
      </div>
      <div class="option-item">
        <span>Itens</span>
        <button>Editar</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="card">
        <h2>Detalhes</h2>
        <p>Veja aqui as informações rápidas sobre seu herói, como raça, alinhamento e pontos.</p>
      </div>
      <div class="card">
        <h2>Status</h2>
        <p>As estatísticas principais aparecem nesse painel, tornando fácil acompanhar o progresso.</p>
      </div>
    </div>
  </div>
</body>
</html>
